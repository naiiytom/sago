[project]
name = "sago-project"
version = "0.1.0"

# Named connections to your data sources.
[connections.warehouse]
type = "postgres"
url = "postgres://user:password@localhost/db"

[connections.archive]
type = "s3"
bucket = "my-data-bucket"
region = "us-east-1"
# Optional: override format detection (parquet | csv | json).
# format = "parquet"

# Datasets to track. Each target references a connection and an identifier
# (a "schema.table" for postgres, an object key for s3).
[targets.users]
connection = "warehouse"
identifier = "public.users"

[targets.events_2024]
connection = "archive"
identifier = "events/2024.parquet"

# Per-target sample persistence for distribution drift metrics. Sampling is ON
# by default (it is what `sago plan`'s PSI drift gate compares against), so this
# block is only needed to tune the sample size or to opt a target out entirely
# with `enabled = false`.
[targets.events_2024.sample]
n = 1000

# drift_threshold gates `sago plan` on the Population Stability Index (PSI): a
# column whose PSI exceeds it fails the plan (non-zero exit). Must be in [0, 1];
# rules of thumb: <0.1 no shift, 0.1–0.25 moderate, >0.25 major.
[checks]
drift_threshold = 0.05
