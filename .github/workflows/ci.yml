name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Format + lint on stable only (rustfmt/clippy output is toolchain-sensitive).
  lint:
    name: fmt + clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt --check
        run: cargo fmt --all -- --check
      - name: cargo clippy -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo clippy (sago-sdk grpc feature) -D warnings
        run: cargo clippy -p sago-sdk --features grpc --all-targets -- -D warnings

  # Build + test on the pinned MSRV and on stable, so a regression on either is caught.
  test:
    name: test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Pinned MSRV (see workspace.package.rust-version) + stable.
        rust: ["1.89", stable]
    steps:
      - uses: actions/checkout@v4
      - name: Install ${{ matrix.rust }} toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
      - name: cargo test --workspace
        run: cargo test --workspace --all-targets
      - name: cargo test --doc
        run: cargo test --workspace --doc
      - name: cargo test (sago-sdk grpc feature)
        run: cargo test -p sago-sdk --features grpc --all-targets

  # Prove the pure-analysis modules still build without the `io` feature for the
  # browser/edge target — the feature-gating contract the WASM crate depends on.
  wasm:
    name: wasm32 build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install stable toolchain with wasm target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - name: sago-core (no default features) on wasm32
        run: cargo build -p sago-core --no-default-features --target wasm32-unknown-unknown
      - name: sago-wasm on wasm32
        run: cargo build -p sago-wasm --target wasm32-unknown-unknown
