syntax = "proto3";

// Sago plugin / microservice interface.
//
// These definitions mirror the core domain types in `sago-core` (schema drift,
// semantic types, drift metrics, snapshots) so a remote provider or plugin can
// expose the same capabilities over gRPC. They are compiled with the pure-Rust
// `protox` compiler at build time, so no system `protoc` toolchain is required.
package sago.v1;

// ── Schema ───────────────────────────────────────────────────────────────────

// A single column in a dataset schema.
message Field {
  string name = 1;
  // Arrow data type, in the debug form used throughout sago (e.g. "Int64", "Utf8").
  string data_type = 2;
  bool nullable = 3;
  // Arrow field-level metadata (arrow::datatypes::Field::metadata), e.g. a
  // column comment or an extension-type marker attached by a custom
  // DataProvider. Without this slot, any such metadata was silently dropped
  // when a schema crossed the gRPC boundary.
  map<string, string> metadata = 4;
}

// An ordered set of fields describing a dataset.
message Schema {
  repeated Field fields = 1;
}

// Inferred semantic meaning of a column's values.
enum SemanticType {
  SEMANTIC_TYPE_UNSPECIFIED = 0;
  SEMANTIC_TYPE_UNKNOWN = 1;
  SEMANTIC_TYPE_EMAIL = 2;
  SEMANTIC_TYPE_CREDIT_CARD = 3;
  SEMANTIC_TYPE_PHONE_NUMBER = 4;
  SEMANTIC_TYPE_UUID = 5;
  SEMANTIC_TYPE_IP_ADDRESS = 6;
  SEMANTIC_TYPE_URL = 7;
}

// ── Drift ──────────────────────────────────────────────────────────────────────

message TypeChange {
  string field_name = 1;
  string old_type = 2;
  string new_type = 3;
}

message SemanticDrift {
  string field_name = 1;
  SemanticType source_type = 2;
  SemanticType target_type = 3;
}

// A column recognised as a rename of a removed column (semantic smart renaming).
message FieldRename {
  string from = 1;
  string to = 2;
  double confidence = 3;
}

message SchemaDrift {
  // Field 4 previously held per-column semantic_drifts, which duplicated
  // DiffReport.semantic_drifts (where semantic drift actually lives). Removed;
  // the number is reserved so it is never reused with a different meaning.
  reserved 4;
  reserved "semantic_drifts";

  repeated string added_fields = 1;
  repeated string removed_fields = 2;
  repeated TypeChange changed_types = 3;
  repeated FieldRename renamed_fields = 5;
}

message ColumnStats {
  uint64 null_count = 1;
  uint64 row_count = 2;
  optional double mean = 3;
  optional double min = 4;
  optional double max = 5;
  optional double variance = 6;
}

message ColumnDrift {
  ColumnStats source_stats = 1;
  ColumnStats target_stats = 2;
  optional double mean_drift = 3;
  int64 null_count_drift = 4;
  optional double ks_statistic = 5;
  optional double ks_p_value = 6;
  optional double psi_statistic = 7;
  // PSI over value-frequency distributions, for string/categorical columns
  // (sago_core::drift::ColumnDrift::categorical_drift). None for numeric
  // columns, which use psi_statistic instead.
  optional double categorical_drift = 8;
}

message DataDrift {
  map<string, ColumnDrift> column_drifts = 1;
}

// The full result of comparing two datasets.
message DiffReport {
  string source_identifier = 1;
  string target_identifier = 2;
  SchemaDrift schema_drift = 3;
  repeated SemanticDrift semantic_drifts = 4;
  DataDrift data_drift = 5;
}

// ── Service ──────────────────────────────────────────────────────────────────

message GetSchemaRequest {
  string identifier = 1;
}

message GetSchemaResponse {
  Schema schema = 1;
}

message DiffRequest {
  string source_identifier = 1;
  string target_identifier = 2;
}

message DiffResponse {
  DiffReport report = 1;
}

// ── Merkle sync ──────────────────────────────────────────────────────────────
//
// Lets a client reconcile its own copy of a dataset against this node's
// without shipping the dataset itself: compare roots, and where they differ,
// walk inclusion proofs to find the specific divergent rows. See
// sago-core::merkle and docs/DECENTRALIZED.md.

message GetMerkleRootRequest {
  string identifier = 1;
}

message GetMerkleRootResponse {
  // Hex-encoded SHA-256 root (sago_core::merkle::MerkleTree::root_hex).
  string root_hex = 1;
  uint64 leaf_count = 2;
}

message GetInclusionProofRequest {
  string identifier = 1;
  uint64 leaf_index = 2;
}

// One step of an inclusion proof: a sibling hash and which side it sits on.
message ProofStep {
  string sibling_hex = 1;
  bool sibling_is_left = 2;
}

message GetInclusionProofResponse {
  // Hex-encoded hash of the leaf at `leaf_index`.
  string leaf_hex = 1;
  repeated ProofStep steps = 2;
}

// Batched form of GetInclusionProofRequest: answers every requested
// leaf_index from one Merkle tree build instead of one build per index.
// reconcile() uses this rather than N individual GetInclusionProof calls, so
// a full reconciliation triggers one server-side full-dataset fetch and tree
// build, not one per checked row.
message GetInclusionProofsRequest {
  string identifier = 1;
  repeated uint64 leaf_indices = 2;
}

message GetInclusionProofsResponse {
  // Same length and order as the request's leaf_indices. An entry is unset
  // (leaf_hex empty, steps empty) if that index was out of range for the
  // current dataset — checked per-entry rather than failing the whole call.
  repeated GetInclusionProofResponse proofs = 1;
  // True for each response entry that was actually found (index in range);
  // parallel array to `proofs`, since proto3 has no per-repeated-element
  // optionality without wrapping each entry in its own message.
  repeated bool found = 2;
}

// A remote data-reliability provider: fetch schemas, compute diffs, and
// reconcile via Merkle commitments over gRPC.
service SagoService {
  rpc GetSchema(GetSchemaRequest) returns (GetSchemaResponse);
  rpc Diff(DiffRequest) returns (DiffResponse);
  rpc GetMerkleRoot(GetMerkleRootRequest) returns (GetMerkleRootResponse);
  rpc GetInclusionProof(GetInclusionProofRequest) returns (GetInclusionProofResponse);
  rpc GetInclusionProofs(GetInclusionProofsRequest) returns (GetInclusionProofsResponse);
}
